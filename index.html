<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>♜ Шахматы — P2P (розовые vs зелёные)</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            font-family: 'Segoe UI', 'Arial', system-ui, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #2b3a2b 0%, #1f2a1f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .game-container {
            background: #4a3622;
            background-image: radial-gradient(circle at 30% 20%, #6b4f32, #2e2419);
            padding: 1.5rem 1.2rem 1.8rem;
            border-radius: 40px;
            box-shadow: 0 30px 35px rgba(0,0,0,0.6), inset 0 2px 5px rgba(255,215,140,0.3);
            border: 1px solid #b99e6b;
            max-width: 700px;
            width: fit-content;
            margin: 0 auto;
        }

        /* Панель соединения — адаптивная */
        .connection-panel {
            background: #2f241acc;
            backdrop-filter: blur(6px);
            padding: 12px 15px;
            border-radius: 50px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border-bottom: 2px solid #bc9b5a;
            color: #f3e7c4;
        }

        .conn-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            min-width: 140px;
        }

        .room-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            flex: 2 1 auto;
            justify-content: flex-end;
        }

        .room-controls input {
            background: #1e2a1e;
            border: 2px solid #8b6f42;
            padding: 8px 12px;
            border-radius: 40px;
            color: #f5e5c9;
            font-weight: bold;
            font-size: 0.9rem;
            width: 160px;
            max-width: 180px;
            text-transform: uppercase;
            outline: none;
            flex-shrink: 1;
        }

        .room-controls input::placeholder {
            color: #a59b7c;
            opacity: 0.8;
            font-size: 0.8rem;
        }

        button {
            background: #6f5230;
            border: none;
            border-bottom: 4px solid #3b2c1b;
            color: #f3e9d2;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #2d1f10, 0 3px 6px black;
            transition: all 0.07s;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid #b4945a;
            white-space: nowrap;
        }

        button:hover {
            background: #8b6a42;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #2d1f10, 0 6px 10px black;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2d1f10, 0 3px 6px black;
        }

        .status-badge {
            background: #1e2a1e;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            color: #eedbba;
            box-shadow: inset 0 0 6px #7f9f6f;
            text-align: center;
            min-width: 150px;
        }

        .board-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            display: block;
            margin: 0 auto;
            width: min(68vw, 68vh, 520px);
            height: min(68vw, 68vh, 520px);
            border-radius: 16px;
            box-shadow: 0 0 0 2px #2e1e0e, 0 18px 28px rgba(0,0,0,0.7);
            background: #e8d5b5;
            cursor: pointer;
        }

        .turn-indicator {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background: #3c2e1fcc;
            backdrop-filter: blur(6px);
            padding: 8px 20px;
            border-radius: 60px;
            box-shadow: inset 0 3px 8px #1f160e, 0 6px 10px #0f0b07;
            border-bottom: 2px solid #bc9b5a;
            color: #f3e7c4;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .player-color {
            background: #2a3a2a;
            padding: 5px 18px;
            border-radius: 30px;
        }

        .footer-note {
            margin-top: 10px;
            color: #cfc19b;
            text-align: center;
            font-size: 0.8rem;
        }

        /* Адаптация для очень узких экранов */
        @media (max-width: 550px) {
            .game-container { padding: 1rem 0.8rem; }
            .connection-panel { flex-direction: column; align-items: stretch; }
            .room-controls { justify-content: center; }
            .room-controls input { width: 130px; }
            button { padding: 6px 12px; font-size: 0.8rem; }
            .status-badge { min-width: 120px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="connection-panel">
        <div class="conn-status">
            <span style="font-size: 1.3rem;">🔄</span>
            <span id="connectionState">⚪ Не подключено</span>
        </div>
        <div class="room-controls">
            <input type="text" id="roomIdInput" placeholder="ID комнаты" maxlength="20" autocomplete="off">
            <button id="hostBtn">🎮 Создать</button>
            <button id="joinBtn">🔗 Войти</button>
            <button id="disconnectBtn" style="background:#5a3e2b;">✖ Откл.</button>
            <button id="resetGameBtn" style="background:#4f6d4f;">🔄 Новая</button>
        </div>
        <div class="status-badge" id="playerInfo">👤 Ожидание...</div>
    </div>

    <div class="board-wrapper">
        <canvas id="chessCanvas" width="520" height="520"></canvas>
        
        <div class="turn-indicator">
            <span id="turnMessage">♔ Ход белых</span>
            <span class="player-color" id="myColorDisplay">⚪ Наблюдатель</span>
        </div>
        <div class="footer-note">
            • Белые — розовые, чёрные — зелёные • Авто-ферзь • Доска повёрнута к вам •
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- КОНФИГУРАЦИЯ ЦВЕТОВ ФИГУР ----------
        const WHITE_PIECE_COLOR = '#ffb6c1';
        const WHITE_PIECE_DARK = '#d88a9a';
        const BLACK_PIECE_COLOR = '#98fb98';
        const BLACK_PIECE_DARK = '#6fbf6f';
        
        const BOARD_SIZE = 520;
        const LIGHT_SQUARE = '#ecd9b4';
        const DARK_SQUARE = '#6f4e2e';
        const HIGHLIGHT_SELECTED = 'rgba(230, 220, 100, 0.7)';
        const HIGHLIGHT_MOVE = 'rgba(90, 180, 110, 0.6)';
        const HIGHLIGHT_LAST = 'rgba(170, 140, 70, 0.4)';
        const PIECE_FONT = 'bold 48px "Segoe UI Symbol", "Arial Unicode MS", "Noto Sans", sans-serif';

        // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
        const canvas = document.getElementById('chessCanvas');
        const ctx = canvas.getContext('2d');
        const connectionStateSpan = document.getElementById('connectionState');
        const playerInfoSpan = document.getElementById('playerInfo');
        const turnMessageSpan = document.getElementById('turnMessage');
        const myColorDisplay = document.getElementById('myColorDisplay');
        const roomIdInput = document.getElementById('roomIdInput');
        
        let game = new Chess();
        let myColor = null;
        let selectedSquare = null;
        let possibleMoves = [];
        let lastMoveFrom = null, lastMoveTo = null;
        let gameOver = false;
        
        let peer = null;
        let conn = null;
        let isHost = false;

        // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ (без изменений) ----------
        function getPieceSymbol(piece) { /* ... как раньше ... */ }
        function getSquareFromPixels(clientX, clientY) { /* ... как раньше ... */ }
        function algebraicToXY(algebraic) { /* ... как раньше ... */ }
        function refreshUIState() { /* ... как раньше ... */ }
        function drawBoard() { /* ... как раньше ... */ }
        function updatePossibleMoves() { /* ... как раньше ... */ }
        function attemptMove(from, to) { /* ... как раньше ... */ }
        function applyRemoteMove(from, to, fen) { /* ... как раньше ... */ }
        function handleData(data) { /* ... как раньше ... */ }
        function resetGame() { /* ... как раньше ... */ }

        // ---------- ИНИЦИАЛИЗАЦИЯ PEER (один раз) ----------
        function initPeerOnce() {
            if (peer) return; // уже создан
            peer = new Peer();
            
            peer.on('open', (id) => {
                connectionStateSpan.textContent = `🟢 Ваш ID: ${id}`;
                // Если пользователь уже нажал "Создать", поле заполнится автоматически
                if (myColor === 'w' && isHost) {
                    roomIdInput.value = id;
                    connectionStateSpan.textContent = `🟡 Ждём подключения к ${id}`;
                }
            });
            
            peer.on('connection', (incomingConn) => {
                if (conn) { incomingConn.close(); return; }
                conn = incomingConn;
                setupConnection();
                conn.on('open', () => {
                    isHost = true;
                    myColor = 'w';
                    playerInfoSpan.textContent = `🌸 Вы БЕЛЫЕ (хост)`;
                    connectionStateSpan.textContent = `🟢 Игра с ${conn.peer.slice(0,8)}`;
                    conn.send({
                        type: 'sync',
                        fen: game.fen(),
                        lastFrom: lastMoveFrom,
                        lastTo: lastMoveTo
                    });
                    refreshUIState();
                });
            });
            
            peer.on('error', (err) => {
                console.error(err);
                connectionStateSpan.textContent = '🔴 Ошибка соединения';
            });
        }

        function setupConnection() {
            conn.on('data', handleData);
            conn.on('close', () => {
                connectionStateSpan.textContent = '🔴 Соединение разорвано';
                playerInfoSpan.textContent = '👤 Ожидание...';
                myColor = null;
                conn = null;
                refreshUIState();
            });
        }

        // Подключение к комнате
        function joinRoom(hostId) {
            if (!peer) initPeerOnce();
            
            const doConnect = () => {
                const newConn = peer.connect(hostId, { reliable: true });
                newConn.on('open', () => {
                    conn = newConn;
                    setupConnection();
                    isHost = false;
                    myColor = 'b';
                    playerInfoSpan.textContent = `🍃 Вы ЧЁРНЫЕ (гость)`;
                    connectionStateSpan.textContent = `🟢 Подключено к ${hostId.slice(0,8)}`;
                    refreshUIState();
                });
                newConn.on('error', () => {
                    alert('Не удалось подключиться. Проверьте ID.');
                    connectionStateSpan.textContent = '❌ Ошибка подключения';
                });
            };
            
            if (peer.id) {
                doConnect();
            } else {
                peer.once('open', doConnect);
            }
        }

        // ---------- ОБРАБОТЧИКИ КНОПОК (исправленные) ----------
        function initUI() {
            canvas.addEventListener('click', onCanvasClick);
            
            // Кнопка "Создать"
            document.getElementById('hostBtn').addEventListener('click', () => {
                if (conn) {
                    alert('Уже есть соединение. Нажмите "Откл."');
                    return;
                }
                
                initPeerOnce(); // создаст peer, если ещё нет
                
                // Сбрасываем состояние игры к начальному
                game.reset();
                lastMoveFrom = lastMoveTo = null;
                selectedSquare = null;
                possibleMoves = [];
                
                myColor = 'w';
                isHost = true;
                playerInfoSpan.textContent = '🌸 Ожидание соперника...';
                
                if (peer.id) {
                    roomIdInput.value = peer.id;
                    connectionStateSpan.textContent = `🟡 Ждём подключения к ${peer.id}`;
                } else {
                    connectionStateSpan.textContent = '🟡 Генерация ID...';
                    // Когда peer откроется, ID появится автоматически (см. peer.on('open'))
                }
                refreshUIState();
            });
            
            // Кнопка "Войти"
            document.getElementById('joinBtn').addEventListener('click', () => {
                if (conn) {
                    alert('Уже подключены.');
                    return;
                }
                const remoteId = roomIdInput.value.trim();
                if (!remoteId) {
                    alert('Введите ID комнаты');
                    return;
                }
                joinRoom(remoteId);
            });
            
            // Кнопка "Откл."
            document.getElementById('disconnectBtn').addEventListener('click', () => {
                if (conn) conn.close();
                conn = null;
                myColor = null;
                isHost = false;
                connectionStateSpan.textContent = '⚪ Отключено';
                playerInfoSpan.textContent = '👤 Ожидание...';
                game.reset();
                lastMoveFrom = lastMoveTo = null;
                selectedSquare = null;
                possibleMoves = [];
                refreshUIState();
            });
            
            // Кнопка "Новая игра"
            document.getElementById('resetGameBtn').addEventListener('click', () => {
                if (!conn || !conn.open) {
                    alert('Нет активной игры');
                    return;
                }
                resetGame();
            });
            
            refreshUIState();
        }

        function onCanvasClick(e) { /* ... как раньше ... */ }

        // Запуск
        initPeerOnce(); // создаём peer сразу при загрузке
        initUI();
        drawBoard();
    })();
</script>
</body>
</html>
