<script>
    (function(){
        "use strict";

        // ---------- КОНФИГУРАЦИЯ ЦВЕТОВ ФИГУР ----------
        const WHITE_PIECE_COLOR = '#ffb6c1';
        const WHITE_PIECE_DARK = '#d88a9a';
        const BLACK_PIECE_COLOR = '#98fb98';
        const BLACK_PIECE_DARK = '#6fbf6f';
        
        const BOARD_SIZE = 520;
        const LIGHT_SQUARE = '#ecd9b4';
        const DARK_SQUARE = '#6f4e2e';
        const HIGHLIGHT_SELECTED = 'rgba(230, 220, 100, 0.7)';
        const HIGHLIGHT_MOVE = 'rgba(90, 180, 110, 0.6)';
        const HIGHLIGHT_LAST = 'rgba(170, 140, 70, 0.4)';
        const PIECE_FONT = 'bold 48px "Segoe UI Symbol", "Arial Unicode MS", "Noto Sans", sans-serif';

        // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
        const canvas = document.getElementById('chessCanvas');
        const ctx = canvas.getContext('2d');
        const connectionStateSpan = document.getElementById('connectionState');
        const playerInfoSpan = document.getElementById('playerInfo');
        const turnMessageSpan = document.getElementById('turnMessage');
        const myColorDisplay = document.getElementById('myColorDisplay');
        const roomIdInput = document.getElementById('roomIdInput');
        
        let game = new Chess();
        let myColor = null;
        let selectedSquare = null;
        let possibleMoves = [];
        let lastMoveFrom = null, lastMoveTo = null;
        let gameOver = false;
        
        let peer = null;
        let conn = null;
        let isHost = false;

        // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ (без изменений) ----------
        function getPieceSymbol(piece) { /* ... как раньше ... */ }
        function getSquareFromPixels(clientX, clientY) { /* ... как раньше ... */ }
        function algebraicToXY(algebraic) { /* ... как раньше ... */ }
        function refreshUIState() { /* ... как раньше ... */ }
        function drawBoard() { /* ... как раньше ... */ }
        function updatePossibleMoves() { /* ... как раньше ... */ }
        function attemptMove(from, to) { /* ... как раньше ... */ }
        function applyRemoteMove(from, to, fen) { /* ... как раньше ... */ }
        function handleData(data) { /* ... как раньше ... */ }
        function resetGame() { /* ... как раньше ... */ }

        // ---------- ИНИЦИАЛИЗАЦИЯ PEER (один раз) ----------
        function initPeerOnce() {
            if (peer) return; // уже создан
            peer = new Peer();
            
            peer.on('open', (id) => {
                connectionStateSpan.textContent = `🟢 Ваш ID: ${id}`;
                // Если пользователь уже нажал "Создать", поле заполнится автоматически
                if (myColor === 'w' && isHost) {
                    roomIdInput.value = id;
                    connectionStateSpan.textContent = `🟡 Ждём подключения к ${id}`;
                }
            });
            
            peer.on('connection', (incomingConn) => {
                if (conn) { incomingConn.close(); return; }
                conn = incomingConn;
                setupConnection();
                conn.on('open', () => {
                    isHost = true;
                    myColor = 'w';
                    playerInfoSpan.textContent = `🌸 Вы БЕЛЫЕ (хост)`;
                    connectionStateSpan.textContent = `🟢 Игра с ${conn.peer.slice(0,8)}`;
                    conn.send({
                        type: 'sync',
                        fen: game.fen(),
                        lastFrom: lastMoveFrom,
                        lastTo: lastMoveTo
                    });
                    refreshUIState();
                });
            });
            
            peer.on('error', (err) => {
                console.error(err);
                connectionStateSpan.textContent = '🔴 Ошибка соединения';
            });
        }

        function setupConnection() {
            conn.on('data', handleData);
            conn.on('close', () => {
                connectionStateSpan.textContent = '🔴 Соединение разорвано';
                playerInfoSpan.textContent = '👤 Ожидание...';
                myColor = null;
                conn = null;
                refreshUIState();
            });
        }

        // Подключение к комнате
        function joinRoom(hostId) {
            if (!peer) initPeerOnce();
            
            const doConnect = () => {
                const newConn = peer.connect(hostId, { reliable: true });
                newConn.on('open', () => {
                    conn = newConn;
                    setupConnection();
                    isHost = false;
                    myColor = 'b';
                    playerInfoSpan.textContent = `🍃 Вы ЧЁРНЫЕ (гость)`;
                    connectionStateSpan.textContent = `🟢 Подключено к ${hostId.slice(0,8)}`;
                    refreshUIState();
                });
                newConn.on('error', () => {
                    alert('Не удалось подключиться. Проверьте ID.');
                    connectionStateSpan.textContent = '❌ Ошибка подключения';
                });
            };
            
            if (peer.id) {
                doConnect();
            } else {
                peer.once('open', doConnect);
            }
        }

        // ---------- ОБРАБОТЧИКИ КНОПОК (исправленные) ----------
        function initUI() {
            canvas.addEventListener('click', onCanvasClick);
            
            // Кнопка "Создать"
            document.getElementById('hostBtn').addEventListener('click', () => {
                if (conn) {
                    alert('Уже есть соединение. Нажмите "Откл."');
                    return;
                }
                
                initPeerOnce(); // создаст peer, если ещё нет
                
                // Сбрасываем состояние игры к начальному
                game.reset();
                lastMoveFrom = lastMoveTo = null;
                selectedSquare = null;
                possibleMoves = [];
                
                myColor = 'w';
                isHost = true;
                playerInfoSpan.textContent = '🌸 Ожидание соперника...';
                
                if (peer.id) {
                    roomIdInput.value = peer.id;
                    connectionStateSpan.textContent = `🟡 Ждём подключения к ${peer.id}`;
                } else {
                    connectionStateSpan.textContent = '🟡 Генерация ID...';
                    // Когда peer откроется, ID появится автоматически (см. peer.on('open'))
                }
                refreshUIState();
            });
            
            // Кнопка "Войти"
            document.getElementById('joinBtn').addEventListener('click', () => {
                if (conn) {
                    alert('Уже подключены.');
                    return;
                }
                const remoteId = roomIdInput.value.trim();
                if (!remoteId) {
                    alert('Введите ID комнаты');
                    return;
                }
                joinRoom(remoteId);
            });
            
            // Кнопка "Откл."
            document.getElementById('disconnectBtn').addEventListener('click', () => {
                if (conn) conn.close();
                conn = null;
                myColor = null;
                isHost = false;
                connectionStateSpan.textContent = '⚪ Отключено';
                playerInfoSpan.textContent = '👤 Ожидание...';
                game.reset();
                lastMoveFrom = lastMoveTo = null;
                selectedSquare = null;
                possibleMoves = [];
                refreshUIState();
            });
            
            // Кнопка "Новая игра"
            document.getElementById('resetGameBtn').addEventListener('click', () => {
                if (!conn || !conn.open) {
                    alert('Нет активной игры');
                    return;
                }
                resetGame();
            });
            
            refreshUIState();
        }

        function onCanvasClick(e) { /* ... как раньше ... */ }

        // Запуск
        initPeerOnce(); // создаём peer сразу при загрузке
        initUI();
        drawBoard();
    })();
</script>
